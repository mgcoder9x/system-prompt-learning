# Cấu hình FSRS cố định — spec mục 8.3. Bất biến theo fsrs_config_version.
# Weights lấy TRỰC TIẾP từ default của fsrs==6.3.1 (spike 2026-07-01), ghi cứng để không phụ thuộc default thư viện.
fsrs_config_version: 1
fsrs_package_version: "6.3.1"          # pin exact; đổi version = tạo config_version mới

# 21 weights của FSRS-6 (Scheduler.parameters mặc định của 6.3.1)
