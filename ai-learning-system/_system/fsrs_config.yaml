desired_retention: 0.9
learning_steps_seconds: [60, 600]      # (1m, 10m) — mặc định 6.3.1
relearning_steps_seconds: [600]        # (10m,)
maximum_interval_days: 36500
enable_fuzzing: false                  # BẮT BUỘC false — fuzzing phá tái lập
serialization:
  round_decimals: 4                    # làm tròn stability/difficulty khi lưu (spec 8.3)
mastered_stability_days: 60            # ngưỡng mastered (spec 6.2)
